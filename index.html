<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./favicon.svg">
    <title>STYLEHUB - Tu Tienda de Moda</title>
    <link rel="stylesheet" href="./estilos/style.css">
</head>
<body>
    <!-- Barra de Navegación -->
    <nav class="nav">
        <h1 class="logo">STYLEHUB</h1>

        <ul class="nav-list">
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Categorías</a></li>
            <li><a href="#">Productos</a></li>
            <li><a href="#">Nuevo</a></li>
            <li><a href="#">Ofertas</a></li>
        </ul>
    </nav>
    <main>
        <!-- Sección Hero -->
        <section class="hero">
            <!-- Left -->
            <div class="hero-content">
                <span class="badge">Nueva Colección 2026</span>
                <h2 class="title">
                    <span>Descubre</span>
                    <span class="gradient">Tu Estilo</span>
                    <span>Único</span>
                </h2>
                <p class="text">
                    Ropa para toda la familia. Moda contemporánea que expresa quien eres.
                </p>
                <div class="actions">
                    <a href="#" class="btn primary">Explorar Colección</a>
                    <a href="#" class="btn secondary">Ver Categorías</a>
                </div>
            </div>
            <!-- Right -->
            <div class="hero-visual">
                <div class="visual-container">
                    <div class="card c1">👗 Mujer</div>
                    <div class="card c2">👔 Hombre</div>
                    <div class="card c3">👶 Niños</div>
                    <div class="card c4">🍼 Bebés</div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
